<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Electoral Review Workbench Civic-first</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="identity">
        <span class="scope-badge">LOCAL REVIEW ONLY</span>
        <div>
          <p class="eyebrow">Lamezia Terme 2025</p>
          <h1>Civic-first electoral review workbench</h1>
        </div>
      </div>
      <div class="summary-strip" id="summaryStrip" aria-live="polite">
        <span>Loading datasets...</span>
      </div>
      <div class="header-actions">
        <input id="importDecisionFile" class="file-input" type="file" accept=".json,.csv,application/json,text/csv" />
        <button id="importDecisionButton" type="button">Import</button>
        <button id="exportJsonButton" type="button">Export JSON</button>
        <button id="exportCsvButton" type="button">Export CSV</button>
      </div>
    </header>

    <main class="workbench-shell">
      <aside class="task-panel" aria-label="Civici da risolvere">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Civici da risolvere</p>
            <h2>Prioritized civic queue</h2>
          </div>
          <span id="taskCountBadge" class="count-badge">0</span>
        </div>

        <div class="filters">
          <label class="full">
            <span>Search</span>
            <input id="searchFilter" type="search" placeholder="street, civic, section, reason" />
          </label>
          <label>
            <span>Task type</span>
            <select id="taskTypeFilter"><option value="">All</option></select>
          </label>
          <label>
            <span>Priority</span>
            <select id="priorityFilter"><option value="">All</option></select>
          </label>
          <label>
            <span>Status</span>
            <select id="statusFilter">
              <option value="">All</option>
              <option value="undecided">Undecided</option>
              <option value="decided">Decided</option>
              <option value="follow_up">Follow-up</option>
            </select>
          </label>
          <label>
            <span>Suggested section</span>
            <select id="suggestedSectionFilter"><option value="">All</option></select>
          </label>
          <label>
            <span>Competing section</span>
            <select id="competingSectionFilter"><option value="">All</option></select>
          </label>
          <label>
            <span>Street</span>
            <select id="streetFilter"><option value="">All</option></select>
          </label>
          <label>
            <span>Reason</span>
            <select id="reasonFilter"><option value="">All</option></select>
          </label>
          <label>
            <span>Street evidence</span>
            <select id="streetEvidenceFilter">
              <option value="">All</option>
              <option value="direct">Direct rule</option>
              <option value="multiple">Multiple rules</option>
              <option value="none">No street rule</option>
            </select>
          </label>
          <label>
            <span>Parity/SNC</span>
            <select id="parityFilter">
              <option value="">All</option>
              <option value="even">Even civics</option>
              <option value="odd">Odd civics</option>
              <option value="snc">SNC</option>
            </select>
          </label>
          <label>
            <span>Decision type</span>
            <select id="decisionTypeFilter"><option value="">All</option></select>
          </label>
          <label class="full">
            <span>Sort</span>
            <select id="sortSelect">
              <option value="priority">Priority</option>
              <option value="civic_count_desc">Civic count descending</option>
              <option value="evidence_strength">Evidence strength</option>
              <option value="direct_rule_first">Direct rule first</option>
              <option value="no_rule_first">No rule first</option>
              <option value="competing_sections_desc">Competing section count descending</option>
              <option value="street">Street</option>
              <option value="suggested_section">Suggested section</option>
            </select>
          </label>
          <label class="check">
            <input id="highOnlyFilter" type="checkbox" />
            <span>High priority</span>
          </label>
          <label class="check">
            <input id="manyCivicsFilter" type="checkbox" />
            <span>Many civics</span>
          </label>
          <label class="check">
            <input id="visibleExtentFilter" type="checkbox" />
            <span>Visible extent</span>
          </label>
          <label class="check">
            <input id="nearBoundaryFilter" type="checkbox" />
            <span>Near boundary</span>
          </label>
        </div>

        <div id="taskListMeta" class="task-meta"></div>
        <div id="taskList" class="task-list"></div>
      </aside>

      <section class="map-panel" aria-label="Review map">
        <div class="map-toolbar">
          <label class="toggle"><input id="toggleOsm" type="checkbox" checked /><span>OSM context</span></label>
          <label class="toggle"><input id="toggleV3" type="checkbox" checked /><span>V3</span></label>
          <label class="toggle"><input id="toggleV2" type="checkbox" /><span>V2</span></label>
          <label class="toggle"><input id="toggleCells" type="checkbox" checked /><span>Cells</span></label>
          <label class="toggle"><input id="toggleReviewPoints" type="checkbox" checked /><span>Review civics</span></label>
          <label class="toggle"><input id="toggleBoundaryPoints" type="checkbox" checked /><span>Boundary</span></label>
          <label class="toggle"><input id="toggleResolvedPoints" type="checkbox" /><span>Resolved</span></label>
          <label class="toggle"><input id="toggleDeterministicPoints" type="checkbox" /><span>Deterministic</span></label>
          <button id="zoomSelectedButton" type="button">Zoom selected</button>
          <button id="showNearbyButton" type="button">Nearby deterministic</button>
          <button id="showCompetingButton" type="button">Competing sections</button>
        </div>
        <div class="map-frame">
          <div id="mapCanvas" class="leaflet-host"></div>
          <svg id="fallbackMap" class="fallback-map" role="img" aria-label="Local geometry fallback map"></svg>
          <div id="mapStatus" class="map-status">Loading map...</div>
        </div>
      </section>

      <aside class="cockpit-panel" aria-label="Decision cockpit">
        <div class="selected-heading">
          <p class="eyebrow">Decision target</p>
          <h2 id="taskTitle">No task selected</h2>
          <div id="taskBadges" class="badge-row"></div>
        </div>

        <nav class="tabs" aria-label="Decision context">
          <button class="active" type="button" data-tab="summary">Summary</button>
          <button type="button" data-tab="civics">Civics</button>
          <button type="button" data-tab="street">Street register</button>
          <button type="button" data-tab="sections">Candidate sections</button>
          <button type="button" data-tab="nearby">Nearby evidence</button>
          <button type="button" data-tab="process">Processo</button>
          <button type="button" data-tab="decision">Decision</button>
        </nav>

        <section id="tabPanel" class="tab-panel"></section>
      </aside>
    </main>

    <template id="decisionFormTemplate">
      <form id="decisionForm" class="decision-form">
        <label>
          <span>Decision type</span>
          <select name="decision_type" required>
            <option value="">Choose...</option>
            <option value="assign_civics_to_section">Assign civics to section</option>
            <option value="confirm_existing_assignment">Confirm existing assignment</option>
            <option value="keep_unresolved">Keep unresolved</option>
            <option value="split_required">Split required</option>
            <option value="needs_external_source">Needs external source</option>
            <option value="exclude_from_geometry">Exclude from geometry</option>
            <option value="mark_as_non_residential_or_special">Mark non-residential or special</option>
          </select>
        </label>
        <label>
          <span>Decision scope</span>
          <select name="decision_scope" required>
            <option value="entire_task">Entire task</option>
            <option value="selected_civics">Selected civics</option>
            <option value="civic_range">Civic range</option>
            <option value="parity_subset">Parity subset</option>
            <option value="snc_only">SNC only</option>
            <option value="keep_task_unresolved">Keep task unresolved</option>
          </select>
        </label>
        <label>
          <span>Proposed section</span>
          <input name="proposed_section_number" type="text" inputmode="numeric" placeholder="e.g. 27" />
        </label>
        <label>
          <span>Civic from</span>
          <input name="civic_from" type="text" inputmode="numeric" />
        </label>
        <label>
          <span>Civic to</span>
          <input name="civic_to" type="text" inputmode="numeric" />
        </label>
        <label>
          <span>Civic parity</span>
          <select name="civic_parity">
            <option value="">Not specified</option>
            <option value="even">Even</option>
            <option value="odd">Odd</option>
            <option value="any">Any numbered civic</option>
          </select>
        </label>
        <label>
          <span>Confidence</span>
          <select name="decision_confidence" required>
            <option value="">Choose...</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
        </label>
        <label>
          <span>Reviewed by</span>
          <input name="reviewed_by" type="text" autocomplete="name" required />
        </label>
        <label>
          <span>Review date</span>
          <input name="review_date" type="date" required />
        </label>
        <label class="wide">
          <span>Reason</span>
          <textarea name="reason" rows="3" required></textarea>
        </label>
        <label class="wide">
          <span>QGIS observation</span>
          <textarea name="qgis_observation" rows="3"></textarea>
        </label>
        <label class="wide">
          <span>Notes</span>
          <textarea name="notes" rows="3"></textarea>
        </label>
        <label class="check wide">
          <input name="includes_snc" type="checkbox" />
          <span>Includes SNC civics</span>
        </label>
        <label class="check wide">
          <input name="requires_follow_up" type="checkbox" />
          <span>Requires follow-up before future V4 work</span>
        </label>
        <div class="form-actions wide">
          <button type="submit">Save decision</button>
          <button id="clearDecisionButton" type="button">Clear</button>
        </div>
      </form>
    </template>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
