    AccessoCivicoTipo:
      type: string
      description: |
        Type of access request, which determines the legal references:
        `generalizzato` (FOIA, art. 5 c.2 d.lgs. 33/2013), `semplice` (access to
        data subject to mandatory publication, art. 5 c.1 d.lgs. 33/2013),
        `documentale` (administrative document access, l. 241/1990).
      enum: [generalizzato, semplice, documentale]

    AccessoCivicoStato:
      type: string
      description: Outcome of the request as tracked by the citizen.
      enum: [in-attesa, accolta, rifiutata]

    AccessoCivicoOrigine:
      type: string
      description: |
        Origin of the entry: `cittadino` for requests filed by citizens through
        the portal, `registro-ufficiale` for entries imported from the
        municipality's official access register (Registro degli accessi).
      enum: [cittadino, registro-ufficiale]

