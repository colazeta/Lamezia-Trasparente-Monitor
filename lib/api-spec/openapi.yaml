openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: categories
    description: Thematic categories
  - name: themes
    description: Civic monitoring themes
  - name: contracts
    description: Public contracts
  - name: acts
    description: Albo pretorio acts (legacy)
  - name: publications
    description: Live albo pretorio feed (publications, delibere, convocazioni, PNRR)
  - name: reports
    description: Citizen reports
  - name: stats
    description: Aggregate statistics
  - name: storage
    description: Object storage upload and serving endpoints
  - name: questions
    description: Curated citizen questions ("Cosa puoi scoprire?")
  - name: oversight
    description: Pareri degli organi di vigilanza e controllo
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /themes:
    get:
      operationId: listThemes
      tags: [themes]
      summary: List monitoring themes
      parameters:
        - name: categoryId
          in: query
          required: false
          schema:
            type: integer
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [recent, relevance, shares]
      responses:
        "200":
          description: List of themes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Theme"

  /themes/{id}:
    get:
      operationId: getTheme
      tags: [themes]
      summary: Get a theme with full detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Theme detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThemeDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /themes/{id}/relevant:
    post:
      operationId: markThemeRelevant
      tags: [themes]
      summary: Mark a theme as relevant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated theme
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Theme"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /themes/{id}/share:
    post:
      operationId: shareTheme
      tags: [themes]
      summary: Register a share of a theme
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShareInput"
      responses:
        "200":
          description: Updated theme
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Theme"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /themes/{id}/follow:
    post:
      operationId: followTheme
      tags: [themes]
      summary: Follow a theme to receive email updates
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FollowInput"
      responses:
        "200":
          description: Updated theme
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Theme"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /subscriptions/request:
    post:
      operationId: requestSubscriptionsLink
      tags: [themes]
      summary: Email a citizen a secure link to their subscription center
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionsLinkRequest"
      responses:
        "200":
          description: Request accepted (response is identical whether or not the email has subscriptions)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionsLinkResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /themes/{id}/posts:
    get:
      operationId: listThemePosts
      tags: [themes]
      summary: List the narrative posts (cronistoria) of a theme
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of theme posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ThemePost"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createThemePost
      tags: [themes]
      summary: Create a narrative post for a theme
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ThemePostInput"
      responses:
        "201":
          description: Created post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThemePost"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /themes/{id}/posts/{postId}:
    patch:
      operationId: updateThemePost
      tags: [themes]
      summary: Edit a narrative post of a theme
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ThemePostUpdateInput"
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThemePost"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteThemePost
      tags: [themes]
      summary: Delete a narrative post of a theme
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /storage/uploads/request-url:
    post:
      tags: [storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for image upload
      description: |
        Returns a presigned GCS URL for direct upload. The client sends JSON
        metadata here, then uploads the file directly to the returned URL.
        Protected by the same ingest token as content ingestion.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /storage/public-objects/{filePath}:
    get:
      tags: [storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      description: |
        Unconditionally public — no authentication or ACL checks.
        Searches PUBLIC_OBJECT_SEARCH_PATHS for the given file path.
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
          description: Relative file path within the public search paths.
      responses:
        "200":
          description: Object content streamed with correct Content-Type.
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: File not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Failed to serve public object.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /storage/objects/{objectPath}:
    get:
      tags: [storage]
      operationId: getStorageObject
      summary: Serve an uploaded image from PRIVATE_OBJECT_DIR
      description: |
        Serves object entities uploaded via presigned URLs. Cronistoria post
        images are served publicly from here.
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
          description: Object path within the private object dir (e.g. `uploads/some-uuid`).
      responses:
        "200":
          description: Object content streamed with correct Content-Type.
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Failed to serve object.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /questions:
    get:
      operationId: listQuestions
      tags: [questions]
      summary: List published curated questions
      parameters:
        - name: topic
          in: query
          required: false
          description: Filter by topic grouping
          schema:
            type: string
        - name: featured
          in: query
          required: false
          description: Only return featured questions
          schema:
            type: boolean
      responses:
        "200":
          description: List of published questions ordered by sort order
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"
    post:
      operationId: createQuestion
      tags: [questions]
      summary: Create a curated question
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionInput"
      responses:
        "201":
          description: Created question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /questions/all:
    get:
      operationId: listAllQuestions
      tags: [questions]
      summary: List all questions including drafts (protected, for the editor)
      responses:
        "200":
          description: List of all questions ordered by sort order
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /questions/{id}:
    patch:
      operationId: updateQuestion
      tags: [questions]
      summary: Edit a curated question
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionUpdateInput"
      responses:
        "200":
          description: Updated question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteQuestion
      tags: [questions]
      summary: Delete a curated question
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /contracts:
    get:
      operationId: listContracts
      tags: [contracts]
      summary: List public contracts (ANAC)
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: supplier
          in: query
          required: false
          description: Filter by beneficiary / supplier name
          schema:
            type: string
        - name: procedureType
          in: query
          required: false
          schema:
            type: string
        - name: acquisitionTool
          in: query
          required: false
          schema:
            type: string
        - name: minAmount
          in: query
          required: false
          schema:
            type: number
        - name: maxAmount
          in: query
          required: false
          schema:
            type: number
        - name: from
          in: query
          required: false
          description: Award date on or after (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: false
          description: Award date on or before (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: themeId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of contracts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contract"

  /contracts/feed-status:
    get:
      operationId: getContractsFeedStatus
      tags: [contracts]
      summary: Status and last-updated info for the ANAC contracts feed
      responses:
        "200":
          description: Feed status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedStatus"

  /contracts/analytics:
    get:
      operationId: getContractsAnalytics
      tags: [contracts]
      summary: Filter-reactive analytics over public contracts
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: supplier
          in: query
          required: false
          schema:
            type: string
        - name: procedureType
          in: query
          required: false
          schema:
            type: string
        - name: acquisitionTool
          in: query
          required: false
          schema:
            type: string
        - name: minAmount
          in: query
          required: false
          schema:
            type: number
        - name: maxAmount
          in: query
          required: false
          schema:
            type: number
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: themeId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Aggregated analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractAnalytics"

  /contracts/{id}:
    get:
      operationId: getContract
      tags: [contracts]
      summary: Get a single contract by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contract detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"
        "404":
          description: Not found
    patch:
      operationId: updateContractMacrotema
      tags: [contracts]
      summary: Update a contract's spending area (macrotema). Editor only.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContract"
      responses:
        "200":
          description: Updated contract
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"
        "400":
          description: Invalid spending area
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /publications:
    get:
      operationId: listPublications
      tags: [publications]
      summary: List albo pretorio publications (live feed)
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: category
          in: query
          required: false
          description: albo | delibera | convocazione
          schema:
            type: string
        - name: tipologia
          in: query
          required: false
          schema:
            type: string
        - name: from
          in: query
          required: false
          description: Filter published on or after this date (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: false
          description: Filter published on or before this date (YYYY-MM-DD)
          schema:
            type: string
            format: date
      responses:
        "200":
          description: List of publications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Publication"

  /publications/feed-status:
    get:
      operationId: getFeedStatus
      tags: [publications]
      summary: Status and last-updated info for the live albo feed
      responses:
        "200":
          description: Feed status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedStatus"

  /delibere:
    get:
      operationId: listDelibere
      tags: [publications]
      summary: List deliberazioni (giunta | consiglio)
      parameters:
        - name: tipo
          in: query
          required: false
          description: giunta | consiglio
          schema:
            type: string
        - name: q
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of delibere
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Publication"

  /convocazioni:
    get:
      operationId: listConvocazioni
      tags: [publications]
      summary: List convocazioni (consiglio | commissione)
      parameters:
        - name: tipo
          in: query
          required: false
          description: consiglio | commissione
          schema:
            type: string
      responses:
        "200":
          description: List of convocazioni
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Publication"

  /convocazioni/{id}:
    get:
      operationId: getSeduta
      tags: [publications]
      summary: Get a single seduta with its stenographic report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Seduta detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SedutaDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /convocazioni/{id}/report:
    post:
      operationId: upsertSedutaReport
      tags: [publications]
      summary: Create or replace the stenographic report of a seduta
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SedutaReportInput"
      responses:
        "200":
          description: Updated seduta detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SedutaDetail"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /organi:
    get:
      operationId: listOrgani
      tags: [organi]
      summary: List the political bodies (organi) of the Comune
      responses:
        "200":
          description: List of organi
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Organo"

  /organi/{slug}:
    get:
      operationId: getOrgano
      tags: [organi]
      summary: Get an organo with its members and recent sedute
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Organo detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganoDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /sedute:
    get:
      operationId: listSedute
      tags: [organi]
      summary: List sedute, optionally filtered by organo or type
      parameters:
        - name: organo
          in: query
          required: false
          description: organo slug
          schema:
            type: string
        - name: tipo
          in: query
          required: false
          description: consiglio | giunta | commissione
          schema:
            type: string
      responses:
        "200":
          description: List of sedute
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Seduta"

  /pnrr/projects:
    get:
      operationId: listPnrrProjects
      tags: [publications]
      summary: PNRR census based on the official Attuazione Misure PNRR registry
      responses:
        "200":
          description: PNRR census
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PnrrCensus"

  /officials:
    get:
      operationId: listOfficials
      tags: [officials]
      summary: List public officials and staff
      parameters:
        - name: role
          in: query
          required: false
          description: sindaco | assessore | consigliere | dirigente | dipendente
          schema:
            type: string
        - name: q
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of officials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Official"
    post:
      operationId: createOfficial
      tags: [officials]
      summary: Create a public official with optional profile data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OfficialInput"
      responses:
        "201":
          description: Created official profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfficialProfile"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /officials/{id}:
    get:
      operationId: getOfficial
      tags: [officials]
      summary: Get a single official's full transparency profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Official profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfficialProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: updateOfficial
      tags: [officials]
      summary: Update an official and replace their profile data
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OfficialInput"
      responses:
        "200":
          description: Updated official profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfficialProfile"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /delibere/{id}/votes:
    get:
      operationId: getDeliberaVotes
      tags: [officials]
      summary: Voting breakdown for a single delibera
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Delibera voting breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliberaVotes"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /reports:
    get:
      operationId: listReports
      tags: [reports]
      summary: List citizen reports
      responses:
        "200":
          description: List of reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Report"
    post:
      operationId: createReport
      tags: [reports]
      summary: Submit a citizen report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportInput"
      responses:
        "201":
          description: Created report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /stats/overview:
    get:
      operationId: getStatsOverview
      tags: [stats]
      summary: Aggregate overview counts
      responses:
        "200":
          description: Overview stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsOverview"

  /stats/top-themes:
    get:
      operationId: getTopThemes
      tags: [stats]
      summary: Top themes by relevance and shares
      responses:
        "200":
          description: Top themes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopThemes"

  /stats/activity:
    get:
      operationId: getRecentActivity
      tags: [stats]
      summary: Recent activity feed
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /stats/shares:
    get:
      operationId: getShareStats
      tags: [stats]
      summary: Share statistics grouped by channel
      responses:
        "200":
          description: Share stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ShareChannelStat"

  /oversight-opinions:
    get:
      operationId: listOversightOpinions
      tags: [oversight]
      summary: List oversight body opinions
      parameters:
        - name: issuingBody
          in: query
          required: false
          description: Filter by issuing oversight body
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: year
          in: query
          required: false
          description: Filter by year of the opinion date
          schema:
            type: integer
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [recent, oldest]
      responses:
        "200":
          description: List of oversight opinions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OversightOpinion"

  /oversight-opinions/{id}:
    get:
      operationId: getOversightOpinion
      tags: [oversight]
      summary: Get a single oversight opinion with its documents
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Oversight opinion detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OversightOpinionDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name.
        size:
          type: integer
          minimum: 1
          description: File size in bytes.
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file (e.g. `image/jpeg`).

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
          description: Presigned GCS URL for PUT upload.
        objectPath:
          type: string
          description: Normalized object path (e.g. `/objects/uploads/uuid`). Embed this in the post body.
        metadata:
          $ref: "#/components/schemas/UploadUrlRequest"

    Category:
      type: object
      required: [id, name, slug, description, themeCount]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        themeCount:
          type: integer

    Theme:
      type: object
      required:
        - id
        - title
        - slug
        - summary
        - categoryId
        - categoryName
        - status
        - relevanceCount
        - shareCount
        - followerCount
        - updatedAt
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        summary:
          type: string
        categoryId:
          type: integer
        categoryName:
          type: string
        status:
          type: string
          enum: [aperto, in_corso, monitoraggio, chiuso]
        relevanceCount:
          type: integer
        shareCount:
          type: integer
        followerCount:
          type: integer
        updatedAt:
          type: string

    ThemeDetail:
      type: object
      required:
        - id
        - title
        - slug
        - summary
        - description
        - categoryId
        - categoryName
        - status
        - relevanceCount
        - shareCount
        - followerCount
        - updatedAt
        - documents
        - emails
        - metrics
        - contracts
        - acts
        - posts
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        summary:
          type: string
        description:
          type: string
        categoryId:
          type: integer
        categoryName:
          type: string
        status:
          type: string
          enum: [aperto, in_corso, monitoraggio, chiuso]
        relevanceCount:
          type: integer
        shareCount:
          type: integer
        followerCount:
          type: integer
        updatedAt:
          type: string
        documents:
          type: array
          items:
            $ref: "#/components/schemas/ThemeDocument"
        emails:
          type: array
          items:
            $ref: "#/components/schemas/ThemeEmail"
        metrics:
          type: array
          items:
            $ref: "#/components/schemas/ThemeMetric"
        contracts:
          type: array
          items:
            $ref: "#/components/schemas/Contract"
        acts:
          type: array
          items:
            $ref: "#/components/schemas/Act"
        posts:
          type: array
          items:
            $ref: "#/components/schemas/ThemePost"

    ThemePost:
      type: object
      required: [id, themeId, body, eventDate, createdAt, updatedAt]
      properties:
        id:
          type: integer
        themeId:
          type: integer
        title:
          type: ["string", "null"]
        body:
          type: string
        eventDate:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string

    ThemePostInput:
      type: object
      required: [body]
      properties:
        title:
          type: string
        body:
          type: string
          minLength: 1
        eventDate:
          type: string

    ThemePostUpdateInput:
      type: object
      properties:
        title:
          type: ["string", "null"]
        body:
          type: string
          minLength: 1
        eventDate:
          type: string

    Question:
      type: object
      required:
        - id
        - text
        - destinationPath
        - ctaLabel
        - topic
        - featured
        - sortOrder
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        text:
          type: string
        teaser:
          type: ["string", "null"]
        destinationPath:
          type: string
        ctaLabel:
          type: string
        topic:
          type: string
        featured:
          type: boolean
        sortOrder:
          type: integer
        status:
          type: string
          enum: [draft, published]
        createdAt:
          type: string
        updatedAt:
          type: string

    QuestionInput:
      type: object
      required: [text, destinationPath, ctaLabel, topic]
      properties:
        text:
          type: string
          minLength: 1
        teaser:
          type: string
        destinationPath:
          type: string
          minLength: 1
        ctaLabel:
          type: string
          minLength: 1
        topic:
          type: string
          minLength: 1
        featured:
          type: boolean
        sortOrder:
          type: integer
        status:
          type: string
          enum: [draft, published]

    QuestionUpdateInput:
      type: object
      properties:
        text:
          type: string
          minLength: 1
        teaser:
          type: ["string", "null"]
        destinationPath:
          type: string
          minLength: 1
        ctaLabel:
          type: string
          minLength: 1
        topic:
          type: string
          minLength: 1
        featured:
          type: boolean
        sortOrder:
          type: integer
        status:
          type: string
          enum: [draft, published]

    ThemeDocument:
      type: object
      required: [id, title, type, date]
      properties:
        id:
          type: integer
        title:
          type: string
        type:
          type: string
        url:
          type: ["string", "null"]
        date:
          type: string

    ThemeEmail:
      type: object
      required: [id, subject, sender, recipient, direction, date, body]
      properties:
        id:
          type: integer
        subject:
          type: string
        sender:
          type: string
        recipient:
          type: string
        direction:
          type: string
          enum: [inviata, ricevuta]
        date:
          type: string
        body:
          type: string

    ThemeMetric:
      type: object
      required: [id, label, value, unit]
      properties:
        id:
          type: integer
        label:
          type: string
        value:
          type: string
        unit:
          type: string

    Contract:
      type: object
      required:
        - id
        - title
        - description
        - supplier
        - amount
        - procedureType
        - status
        - awardDate
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        supplier:
          type: string
        amount:
          type: number
        procedureType:
          type: string
        status:
          type: string
        awardDate:
          type: string
        cig:
          type: ["string", "null"]
        cup:
          type: ["string", "null"]
        stazioneAppaltante:
          type: ["string", "null"]
        acquisitionTool:
          type: ["string", "null"]
        withoutTender:
          type: boolean
        withoutMepa:
          type: boolean
        anacUrl:
          type: ["string", "null"]
        themeId:
          type: ["integer", "null"]
        macrotema:
          description: Spending-area key (ambiente, scuole, strade, …) or null
          oneOf:
            - $ref: "#/components/schemas/MacrotemaKey"
            - type: "null"
        macrotemaManual:
          type: boolean
          description: True when an editor manually corrected the spending area

    MacrotemaKey:
      type: string
      description: Ambito di spesa (macrotema) di un contratto
      enum:
        - ambiente
        - scuole
        - strade
        - sociale
        - cultura
        - mobilita
        - altro

    UpdateContract:
      type: object
      required: [macrotema]
      properties:
        macrotema:
          $ref: "#/components/schemas/MacrotemaKey"

    NameCount:
      type: object
      required: [name, count]
      properties:
        name:
          type: string
        count:
          type: integer

    NameValue:
      type: object
      required: [name, value]
      properties:
        name:
          type: string
        value:
          type: number

    AmountOverTime:
      type: object
      required: [period, amount, count]
      properties:
        period:
          type: string
        amount:
          type: number
        count:
          type: integer

    ContractAnalytics:
      type: object
      required:
        - totalCount
        - totalAmount
        - withoutTenderCount
        - withoutTenderPct
        - withoutMepaCount
        - withoutMepaPct
        - topBeneficiaries
        - mostRecurrentBeneficiary
        - byProcedure
        - byAcquisitionTool
        - amountOverTime
      properties:
        totalCount:
          type: integer
        totalAmount:
          type: number
        withoutTenderCount:
          type: integer
        withoutTenderPct:
          type: number
        withoutMepaCount:
          type: integer
        withoutMepaPct:
          type: number
        topBeneficiaries:
          type: array
          items:
            $ref: "#/components/schemas/NameValue"
        mostRecurrentBeneficiary:
          oneOf:
            - $ref: "#/components/schemas/NameCount"
            - type: "null"
        byProcedure:
          type: array
          items:
            $ref: "#/components/schemas/NameCount"
        byAcquisitionTool:
          type: array
          items:
            $ref: "#/components/schemas/NameCount"
        amountOverTime:
          type: array
          items:
            $ref: "#/components/schemas/AmountOverTime"

    Act:
      type: object
      required:
        - id
        - title
        - type
        - number
        - summary
        - publishDate
        - endDate
      properties:
        id:
          type: integer
        title:
          type: string
        type:
          type: string
        number:
          type: string
        summary:
          type: string
        publishDate:
          type: string
        endDate:
          type: string
        themeId:
          type: ["integer", "null"]

    Publication:
      type: object
      required:
        - id
        - progressivo
        - tipologia
        - category
        - oggetto
        - cups
        - isPnrr
        - isNew
        - firstSeenAt
      properties:
        id:
          type: integer
        progressivo:
          type: string
        tipologia:
          type: string
        category:
          type: string
        subcategory:
          type: ["string", "null"]
        provenienza:
          type: ["string", "null"]
        oggetto:
          type: string
        dataAtto:
          type: ["string", "null"]
        pubStart:
          type: ["string", "null"]
        pubEnd:
          type: ["string", "null"]
        numRegSet:
          type: ["string", "null"]
        numRegGen:
          type: ["string", "null"]
        cups:
          type: array
          items:
            type: string
        pnrrMission:
          type: ["string", "null"]
        isPnrr:
          type: boolean
        isNew:
          type: boolean
        firstSeenAt:
          type: string

    FeedStatus:
      type: object
      required:
        - source
        - status
        - itemsTotal
        - itemsNew
      properties:
        source:
          type: string
        label:
          type: ["string", "null"]
        url:
          type: ["string", "null"]
        status:
          type: string
        error:
          type: ["string", "null"]
        itemsTotal:
          type: integer
        itemsNew:
          type: integer
        lastCheckedAt:
          type: ["string", "null"]
        lastUpdatedAt:
          type: ["string", "null"]

    PnrrAttachment:
      type: object
      required: [title, url]
      properties:
        title:
          type: string
        url:
          type: string

    PnrrProject:
      type: object
      required:
        - key
        - sourceId
        - url
        - title
        - attachments
        - documentsCount
        - documents
      properties:
        key:
          type: string
        sourceId:
          type: string
        url:
          type: string
        title:
          type: string
        cup:
          type: ["string", "null"]
        mission:
          type: ["string", "null"]
        component:
          type: ["string", "null"]
        investment:
          type: ["string", "null"]
        intervention:
          type: ["string", "null"]
        holder:
          type: ["string", "null"]
        attuatore:
          type: ["string", "null"]
        importoFinanziato:
          type: ["string", "null"]
        status:
          type: ["string", "null"]
        startDate:
          type: ["string", "null"]
        endDate:
          type: ["string", "null"]
        publishedAt:
          type: ["string", "null"]
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/PnrrAttachment"
        documentsCount:
          type: integer
        lastPublication:
          type: ["string", "null"]
        documents:
          type: array
          items:
            $ref: "#/components/schemas/Publication"

    PnrrCensus:
      type: object
      required: [projects, uncensored]
      properties:
        projects:
          type: array
          items:
            $ref: "#/components/schemas/PnrrProject"
        uncensored:
          type: array
          items:
            $ref: "#/components/schemas/Publication"

    SedutaIntervention:
      type: object
      required: [id, speakerName, content, position]
      properties:
        id:
          type: integer
        speakerName:
          type: string
        speakerRole:
          type: ["string", "null"]
        content:
          type: string
        position:
          type: integer

    SedutaDetail:
      allOf:
        - $ref: "#/components/schemas/Publication"
        - type: object
          required: [hasReport, summary, interventions, organo, votes]
          properties:
            hasReport:
              type: boolean
            summary:
              type: ["string", "null"]
            interventions:
              type: array
              items:
                $ref: "#/components/schemas/SedutaIntervention"
            organo:
              oneOf:
                - $ref: "#/components/schemas/OrganoRef"
                - type: "null"
            votes:
              type: array
              items:
                $ref: "#/components/schemas/SedutaVote"

    OrganoRef:
      type: object
      required: [id, type, name, slug]
      properties:
        id:
          type: integer
        type:
          type: string
          description: consiglio | giunta | commissione
        name:
          type: string
        slug:
          type: string

    Organo:
      allOf:
        - $ref: "#/components/schemas/OrganoRef"
        - type: object
          required: [description, position, memberCount, sedutaCount]
          properties:
            description:
              type: ["string", "null"]
            position:
              type: integer
            memberCount:
              type: integer
            sedutaCount:
              type: integer

    OrganoMember:
      type: object
      required: [officialId, name, slug, role, status, membershipRole]
      properties:
        officialId:
          type: integer
        name:
          type: string
        slug:
          type: string
        role:
          type: string
        roleTitle:
          type: ["string", "null"]
        group:
          type: ["string", "null"]
        status:
          type: string
        membershipRole:
          type: ["string", "null"]

    OrganoDetail:
      allOf:
        - $ref: "#/components/schemas/Organo"
        - type: object
          required: [members, sedute]
          properties:
            members:
              type: array
              items:
                $ref: "#/components/schemas/OrganoMember"
            sedute:
              type: array
              items:
                $ref: "#/components/schemas/Seduta"

    Seduta:
      type: object
      required: [id, type, date, agenda, hasReport, publicationId, organo]
      properties:
        id:
          type: integer
        type:
          type: string
          description: consiglio | giunta | commissione
        date:
          type: ["string", "null"]
        agenda:
          type: ["string", "null"]
        hasReport:
          type: boolean
        publicationId:
          type: ["integer", "null"]
        organo:
          oneOf:
            - $ref: "#/components/schemas/OrganoRef"
            - type: "null"

    SedutaVote:
      type: object
      required: [officialId, name, slug, vote]
      properties:
        officialId:
          type: integer
        name:
          type: string
        slug:
          type: string
        vote:
          type: string
          enum: [favorevole, contrario, astenuto, assente]

    SedutaReportInput:
      type: object
      required: [interventions]
      properties:
        summary:
          type: string
        interventions:
          type: array
          items:
            type: object
            required: [speakerName, content]
            properties:
              speakerName:
                type: string
                minLength: 1
              speakerRole:
                type: string
              content:
                type: string
                minLength: 1

    Report:
      type: object
      required:
        - id
        - title
        - description
        - category
        - location
        - status
        - createdAt
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
        location:
          type: string
        status:
          type: string
          enum: [ricevuta, in_valutazione, presa_in_carico, archiviata]
        citizenName:
          type: ["string", "null"]
        createdAt:
          type: string

    ReportInput:
      type: object
      required: [title, description, category, location]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        category:
          type: string
          minLength: 1
        location:
          type: string
          minLength: 1
        citizenName:
          type: string

    ShareInput:
      type: object
      required: [channel]
      properties:
        channel:
          type: string
          enum: [facebook, twitter, whatsapp, email, link]

    FollowInput:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    SubscriptionsLinkRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    SubscriptionsLinkResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    StatsOverview:
      type: object
      required:
        - themes
        - contracts
        - acts
        - reports
        - totalRelevance
        - totalShares
        - monitoredAmount
      properties:
        themes:
          type: integer
        contracts:
          type: integer
        acts:
          type: integer
        reports:
          type: integer
        totalRelevance:
          type: integer
        totalShares:
          type: integer
        monitoredAmount:
          type: number

    TopThemes:
      type: object
      required: [byRelevance, byShares]
      properties:
        byRelevance:
          type: array
          items:
            $ref: "#/components/schemas/Theme"
        byShares:
          type: array
          items:
