openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: categories
    description: Thematic categories
  - name: themes
    description: Civic monitoring themes
  - name: contracts
    description: Public contracts
  - name: acts
    description: Albo pretorio acts (legacy)
  - name: publications
    description: Live albo pretorio feed (publications, delibere, convocazioni, PNRR)
  - name: reports
    description: Citizen reports
  - name: stats
    description: Aggregate statistics
  - name: storage
    description: Object storage upload and serving endpoints
  - name: questions
    description: Curated citizen questions ("Cosa puoi scoprire?")
  - name: oversight
    description: Pareri degli organi di vigilanza e controllo
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /themes:
    get:
      operationId: listThemes
      tags: [themes]
      summary: List monitoring themes
      parameters:
        - name: categoryId
          in: query
          required: false
          schema:
            type: integer
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [recent, relevance, shares]
      responses:
        "200":
          description: List of themes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Theme"

  /themes/{id}:
    get:
      operationId: getTheme
      tags: [themes]
      summary: Get a theme with full detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Theme detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThemeDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /themes/{id}/relevant:
    post:
      operationId: markThemeRelevant
      tags: [themes]
      summary: Mark a theme as relevant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated theme
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Theme"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: withdrawThemeRelevant
      tags: [themes]
      summary: Withdraw a previously sent relevance signal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated theme
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Theme"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /themes/{id}/share:
    post:
      operationId: shareTheme
      tags: [themes]
      summary: Register a share of a theme
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShareInput"
      responses:
        "200":
          description: Updated theme
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Theme"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /themes/{id}/follow:
    post:
      operationId: followTheme
      tags: [themes]
      summary: Follow a theme to receive email updates
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FollowInput"
      responses:
        "200":
          description: Updated theme
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Theme"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /subscriptions/request:
    post:
      operationId: requestSubscriptionsLink
      tags: [themes]
      summary: Email a citizen a secure link to their subscription center
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionsLinkRequest"
      responses:
        "200":
          description: Request accepted (response is identical whether or not the email has subscriptions)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionsLinkResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /themes/{id}/posts:
    get:
      operationId: listThemePosts
      tags: [themes]
      summary: List the narrative posts (cronistoria) of a theme
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of theme posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ThemePost"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createThemePost
      tags: [themes]
      summary: Create a narrative post for a theme
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ThemePostInput"
      responses:
        "201":
          description: Created post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThemePost"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /themes/{id}/posts/{postId}:
    patch:
      operationId: updateThemePost
      tags: [themes]
      summary: Edit a narrative post of a theme
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ThemePostUpdateInput"
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThemePost"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteThemePost
      tags: [themes]
      summary: Delete a narrative post of a theme
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /storage/uploads/request-url:
    post:
      tags: [storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for image upload
      description: |
        Returns a presigned GCS URL for direct upload. The client sends JSON
        metadata here, then uploads the file directly to the returned URL.
        Protected by the same ingest token as content ingestion.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /storage/public-objects/{filePath}:
    get:
      tags: [storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      description: |
        Unconditionally public — no authentication or ACL checks.
        Searches PUBLIC_OBJECT_SEARCH_PATHS for the given file path.
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
          description: Relative file path within the public search paths.
      responses:
        "200":
          description: Object content streamed with correct Content-Type.
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: File not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Failed to serve public object.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /storage/objects/{objectPath}:
    get:
      tags: [storage]
      operationId: getStorageObject
      summary: Serve an uploaded image from PRIVATE_OBJECT_DIR
      description: |
        Serves object entities uploaded via presigned URLs. Cronistoria post
        images are served publicly from here.
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
          description: Object path within the private object dir (e.g. `uploads/some-uuid`).
      responses:
        "200":
          description: Object content streamed with correct Content-Type.
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Failed to serve object.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /questions:
    get:
      operationId: listQuestions
      tags: [questions]
      summary: List published curated questions
      parameters:
        - name: topic
          in: query
          required: false
          description: Filter by topic grouping
          schema:
            type: string
        - name: featured
          in: query
          required: false
          description: Only return featured questions
          schema:
            type: boolean
      responses:
        "200":
          description: List of published questions ordered by sort order
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"
    post:
      operationId: createQuestion
      tags: [questions]
      summary: Create a curated question
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionInput"
      responses:
        "201":
          description: Created question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /questions/all:
    get:
      operationId: listAllQuestions
      tags: [questions]
      summary: List all questions including drafts (protected, for the editor)
      responses:
        "200":
          description: List of all questions ordered by sort order
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /questions/{id}:
    patch:
      operationId: updateQuestion
      tags: [questions]
      summary: Edit a curated question
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionUpdateInput"
      responses:
        "200":
          description: Updated question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteQuestion
      tags: [questions]
      summary: Delete a curated question
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /contracts:
    get:
      operationId: listContracts
      tags: [contracts]
      summary: List public contracts (ANAC)
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: supplier
          in: query
          required: false
          description: Filter by beneficiary / supplier name
          schema:
            type: string
        - name: procedureType
          in: query
          required: false
          schema:
            type: string
        - name: acquisitionTool
          in: query
          required: false
          schema:
            type: string
        - name: minAmount
          in: query
          required: false
          schema:
            type: number
        - name: maxAmount
          in: query
          required: false
          schema:
            type: number
        - name: from
          in: query
          required: false
          description: Award date on or after (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: false
          description: Award date on or before (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: themeId
          in: query
          required: false
          schema:
            type: integer
        - name: quartiere
          in: query
          required: false
          description: Filter by neighborhood key (nicastro / sambiase / santeufemia)
          schema:
            type: string
        - name: hasLocation
          in: query
          required: false
          description: When true, only contracts that have geographic coordinates
          schema:
            type: boolean
      responses:
        "200":
          description: List of contracts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contract"

  /contracts/feed-status:
    get:
      operationId: getContractsFeedStatus
      tags: [contracts]
      summary: Status and last-updated info for the ANAC contracts feed
      responses:
        "200":
          description: Feed status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedStatus"

  /contracts/analytics:
    get:
      operationId: getContractsAnalytics
      tags: [contracts]
      summary: Filter-reactive analytics over public contracts
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: supplier
          in: query
          required: false
          schema:
            type: string
        - name: procedureType
          in: query
          required: false
          schema:
            type: string
        - name: acquisitionTool
          in: query
          required: false
          schema:
            type: string
        - name: minAmount
          in: query
          required: false
          schema:
            type: number
        - name: maxAmount
          in: query
          required: false
          schema:
            type: number
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: themeId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Aggregated analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractAnalytics"

  /contracts/{id}:
    get:
      operationId: getContract
      tags: [contracts]
      summary: Get a single contract by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contract detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"
        "404":
          description: Not found
    patch:
      operationId: updateContractMacrotema
      tags: [contracts]
      summary: Update a contract's spending area (macrotema). Editor only.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContract"
      responses:
        "200":
          description: Updated contract
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"
        "400":
          description: Invalid spending area
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /contracts/{id}/storyline:
    get:
      operationId: getContractStoryline
      tags: [contracts]
      summary: >-
        Storyline (lifecycle) of a single contract, reconstructed by linking
        Albo Pretorio publications via CIG/CUP.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contract storyline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractStoryline"
        "404":
          description: Not found

  /contracts/{id}/location:
    patch:
      operationId: updateContractLocation
      tags: [contracts]
      summary: Editorial correction of a contract's geographic location. Editor only.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContractLocation"
      responses:
        "200":
          description: Updated contract
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"
        "400":
          description: Invalid location
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /opendata/datasets:
    get:
      operationId: listOpendataDatasets
      tags: [opendata]
      summary: List open-data datasets (Comune di Lamezia Terme catalog)
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: category
          in: query
          required: false
          description: Filter by catalog category (CKAN group)
          schema:
            type: string
      responses:
        "200":
          description: List of datasets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpendataDataset"

  /opendata/feed-status:
    get:
      operationId: getOpendataFeedStatus
      tags: [opendata]
      summary: Status and last-updated info for the open-data feed
      responses:
        "200":
          description: Feed status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedStatus"

  /opendata/datasets/{id}:
    get:
      operationId: getOpendataDataset
      tags: [opendata]
      summary: Get a single open-data dataset by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dataset detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpendataDataset"
        "404":
          description: Not found

  /opendata/resources/{id}/content:
    get:
      operationId: getOpendataResourceContent
      tags: [opendata]
      summary: Parsed tabular content (rows + columns) for a CSV/JSON resource
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Parsed table
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpendataTable"
        "404":
          description: Resource not found
        "422":
          description: Resource format is not tabular
        "502":
          description: Resource could not be downloaded or parsed

  /opendata/resources/{id}/snapshots:
    get:
      operationId: listOpendataResourceSnapshots
      tags: [opendata]
      summary: List available historical snapshots for a tabular resource
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of snapshots (metadata only, no row data)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpendataSnapshotMeta"
        "404":
          description: Resource not found

  /opendata/resources/{id}/snapshots/{snapshotId}:
    get:
      operationId: getOpendataSnapshot
      tags: [opendata]
      summary: Get the full content (columns + rows) of a specific snapshot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: snapshotId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Snapshot with full tabular content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpendataSnapshot"
        "404":
          description: Snapshot not found

  /publications:
    get:
      operationId: listPublications
      tags: [publications]
      summary: List albo pretorio publications (live feed)
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: category
          in: query
          required: false
          description: albo | delibera | convocazione
          schema:
            type: string
        - name: tipologia
          in: query
          required: false
          schema:
            type: string
        - name: macrotema
          in: query
          required: false
          description: Filter by spending area (macrotema key)
          schema:
            $ref: "#/components/schemas/MacrotemaKey"
        - name: from
          in: query
          required: false
          description: Filter published on or after this date (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: false
          description: Filter published on or before this date (YYYY-MM-DD)
          schema:
            type: string
            format: date
      responses:
        "200":
          description: List of publications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Publication"

  /publications/{id}:
    get:
      operationId: getPublication
      tags: [publications]
      summary: Get a single publication with full detail (generates "In breve" lazily)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Publication detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Publication"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /publications/{id}/storia:
    get:
