  /accesso-civico:
    get:
      tags: [accesso-civico]
      operationId: listAccessoCivico
      summary: Public registry of FOIA / accesso civico requests (published only)
      description: |
        Returns the published citizen-tracked requests, optionally filtered by
        outcome, type, linked theme, recipient entity and request-date range.
        Pending (unmoderated) submissions are excluded.
      parameters:
        - name: stato
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccessoCivicoStato"
        - name: tipo
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccessoCivicoTipo"
        - name: themeId
          in: query
          required: false
          schema:
            type: integer
        - name: ente
          in: query
          required: false
          description: Filter by recipient entity (exact match).
          schema:
            type: string
        - name: from
          in: query
          required: false
          description: Only requests sent on or after this ISO date.
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: false
          description: Only requests sent on or before this ISO date.
          schema:
            type: string
            format: date
      responses:
        "200":
          description: List of published requests.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccessoCivicoRequest"
    post:
      tags: [accesso-civico]
      operationId: createAccessoCivico
      summary: Register a sent FOIA request (public; held for moderation)
      description: |
        Lets a citizen register a request they sent to the entity. The entry is
        created in `pending` moderation state and is not publicly visible until
        the editorial team publishes it.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessoCivicoCreateInput"
      responses:
        "201":
          description: Created (pending moderation).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessoCivicoRequestAdmin"
        "400":
          description: Invalid input.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /accesso-civico/importa:
    post:
      tags: [accesso-civico]
      operationId: importAccessoCivico
      summary: Bulk-import rows from the official municipal access register (editorial)
      description: |
        Imports historical entries from the municipality's official access
        register (Registro degli accessi). Entries are marked with origin
        `registro-ufficiale`, published immediately, and deduplicated on a stable
        key (oggetto + requestDate + ente) so re-importing does not create
        duplicates. Returns a summary of created / updated / skipped rows.
      security:
        - ingestToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessoCivicoImportInput"
      responses:
        "200":
          description: Import summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessoCivicoImportResult"
        "400":
          description: Invalid input.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /accesso-civico/admin:
    get:
      tags: [accesso-civico]
      operationId: listAccessoCivicoAdmin
      summary: Editorial list of all requests (incl. pending) for moderation
      security:
        - ingestToken: []
      responses:
        "200":
          description: List of all requests with editorial metadata.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccessoCivicoRequestAdmin"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /accesso-civico/{id}:
    get:
      tags: [accesso-civico]
      operationId: getAccessoCivico
      summary: Public detail of a published request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Request detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessoCivicoRequest"
        "404":
          description: Not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      tags: [accesso-civico]
      operationId: updateAccessoCivico
      summary: Update a request, its outcome and response document (editorial)
      security:
        - ingestToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessoCivicoUpdateInput"
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessoCivicoRequestAdmin"
        "400":
          description: Invalid input.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [accesso-civico]
      operationId: deleteAccessoCivico
      summary: Delete a request (editorial)
      security:
        - ingestToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted.
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /accesso-civico/{id}/pubblica:
    post:
      tags: [accesso-civico]
      operationId: publishAccessoCivico
      summary: Approve a pending request and make it public (editorial)
      security:
        - ingestToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Request published.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessoCivicoRequestAdmin"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name.
        size:
          type: integer
          minimum: 1
          description: File size in bytes.
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file (e.g. `image/jpeg`).

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
          description: Presigned GCS URL for PUT upload.
        objectPath:
          type: string
          description: Normalized object path (e.g. `/objects/uploads/uuid`). Embed this in the post body.
        metadata:
          $ref: "#/components/schemas/UploadUrlRequest"

    Category:
      type: object
      required: [id, name, slug, description, themeCount]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        themeCount:
          type: integer

    Theme:
      type: object
      required:
        - id
        - title
        - slug
        - summary
        - categoryId
        - categoryName
        - status
        - relevanceCount
        - shareCount
        - followerCount
        - signalled
        - updatedAt
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        summary:
          type: string
        categoryId:
          type: integer
        categoryName:
          type: string
        status:
          type: string
          enum: [aperto, in_corso, monitoraggio, chiuso]
        relevanceCount:
          type: integer
        shareCount:
          type: integer
        followerCount:
          type: integer
        signalled:
          type: boolean
          description: Whether the requesting source has already signalled this theme as relevant
        updatedAt:
          type: string

    ThemeDetail:
      type: object
      required:
        - id
        - title
        - slug
        - summary
        - description
        - categoryId
        - categoryName
        - status
        - relevanceCount
        - shareCount
        - followerCount
        - signalled
        - updatedAt
        - documents
        - emails
        - metrics
        - contracts
        - acts
        - posts
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        summary:
          type: string
        description:
          type: string
        categoryId:
          type: integer
        categoryName:
          type: string
        status:
          type: string
          enum: [aperto, in_corso, monitoraggio, chiuso]
        relevanceCount:
          type: integer
        shareCount:
          type: integer
        followerCount:
          type: integer
        signalled:
          type: boolean
          description: Whether the requesting source has already signalled this theme as relevant
        updatedAt:
          type: string
        documents:
          type: array
          items:
            $ref: "#/components/schemas/ThemeDocument"
        emails:
          type: array
          items:
            $ref: "#/components/schemas/ThemeEmail"
        metrics:
          type: array
          items:
            $ref: "#/components/schemas/ThemeMetric"
        contracts:
          type: array
          items:
            $ref: "#/components/schemas/Contract"
        acts:
          type: array
          items:
            $ref: "#/components/schemas/Act"
        posts:
          type: array
          items:
            $ref: "#/components/schemas/ThemePost"

    ThemePost:
      type: object
      required: [id, themeId, body, eventDate, createdAt, updatedAt]
      properties:
        id:
          type: integer
        themeId:
          type: integer
        title:
          type: ["string", "null"]
        body:
          type: string
        eventDate:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string

    ThemePostInput:
      type: object
      required: [body]
      properties:
        title:
          type: string
        body:
          type: string
          minLength: 1
        eventDate:
          type: string

    ThemePostUpdateInput:
      type: object
      properties:
        title:
          type: ["string", "null"]
        body:
          type: string
          minLength: 1
        eventDate:
          type: string

    Question:
      type: object
      required:
        - id
        - text
        - destinationPath
        - ctaLabel
        - topic
        - featured
        - sortOrder
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        text:
          type: string
        teaser:
          type: ["string", "null"]
        destinationPath:
          type: string
        ctaLabel:
          type: string
        topic:
          type: string
        featured:
          type: boolean
        sortOrder:
          type: integer
        status:
          type: string
          enum: [draft, published]
        createdAt:
          type: string
        updatedAt:
          type: string

    QuestionInput:
      type: object
      required: [text, destinationPath, ctaLabel, topic]
      properties:
        text:
          type: string
          minLength: 1
        teaser:
          type: string
        destinationPath:
          type: string
          minLength: 1
        ctaLabel:
          type: string
          minLength: 1
        topic:
          type: string
          minLength: 1
        featured:
          type: boolean
        sortOrder:
          type: integer
        status:
          type: string
          enum: [draft, published]

    QuestionUpdateInput:
      type: object
      properties:
        text:
          type: string
          minLength: 1
        teaser:
          type: ["string", "null"]
        destinationPath:
          type: string
          minLength: 1
        ctaLabel:
          type: string
          minLength: 1
        topic:
          type: string
          minLength: 1
        featured:
          type: boolean
        sortOrder:
          type: integer
        status:
          type: string
          enum: [draft, published]

    ThemeDocument:
      type: object
      required: [id, title, type, date]
      properties:
        id:
          type: integer
        title:
          type: string
        type:
          type: string
        url:
          type: ["string", "null"]
        date:
          type: string

    ThemeEmail:
      type: object
      required: [id, subject, sender, recipient, direction, date, body]
      properties:
        id:
          type: integer
        subject:
          type: string
        sender:
          type: string
        recipient:
          type: string
        direction:
          type: string
          enum: [inviata, ricevuta]
        date:
          type: string
        body:
          type: string

    ThemeMetric:
      type: object
      required: [id, label, value, unit]
      properties:
        id:
          type: integer
        label:
          type: string
        value:
          type: string
        unit:
          type: string

    Contract:
      type: object
      required:
        - id
        - title
        - description
        - supplier
        - amount
        - procedureType
        - status
        - awardDate
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        supplier:
          type: string
        amount:
          type: number
        procedureType:
          type: string
        status:
          type: string
        awardDate:
          type: string
        cig:
          type: ["string", "null"]
        cup:
          type: ["string", "null"]
        stazioneAppaltante:
          type: ["string", "null"]
        acquisitionTool:
          type: ["string", "null"]
        withoutTender:
          type: boolean
        withoutMepa:
          type: boolean
        anacUrl:
          type: ["string", "null"]
        themeId:
          type: ["integer", "null"]
        macrotema:
          description: Spending-area key (ambiente, scuole, strade, …) or null
          oneOf:
            - $ref: "#/components/schemas/MacrotemaKey"
            - type: "null"
        macrotemaManual:
          type: boolean
          description: True when an editor manually corrected the spending area
        latitude:
          type: ["number", "null"]
          description: WGS84 latitude of the intervention, or null if not located
        longitude:
          type: ["number", "null"]
          description: WGS84 longitude of the intervention, or null if not located
        geoAddress:
          type: ["string", "null"]
          description: Resolved location label (e.g. street name)
        geoQuartiere:
          type: ["string", "null"]
          description: Neighborhood key (nicastro / sambiase / santeufemia)
        geoSource:
          type: ["string", "null"]
          description: Origin of the location (auto = geocoding, manual = editor)
        geoManual:
          type: boolean
          description: True when an editor manually set/corrected the location
        geoVerify:
          type: boolean
          description: True when the location is uncertain and needs review

    MacrotemaKey:
      type: string
      description: Ambito di spesa (macrotema) di un contratto
      enum:
        - ambiente
        - scuole
        - strade
        - sociale
        - cultura
        - mobilita
        - altro

    UpdateContract:
      type: object
      required: [macrotema]
      properties:
        macrotema:
          $ref: "#/components/schemas/MacrotemaKey"

    UpdateContractLocation:
      type: object
      description: >-
        Editorial correction of a contract's geographic location. Provide
        latitude+longitude together to set/move the point (or both null to
        clear it). Setting a location marks it as manual so the ingestion
        geocoding will not overwrite it.
      properties:
        latitude:
          type: ["number", "null"]
        longitude:
          type: ["number", "null"]
        geoAddress:
          type: ["string", "null"]
        geoQuartiere:
          type: ["string", "null"]
        geoVerify:
          type: boolean

    NameCount:
      type: object
      required: [name, count]
      properties:
        name:
          type: string
        count:
          type: integer

    NameValue:
      type: object
      required: [name, value]
      properties:
        name:
          type: string
        value:
          type: number

    AmountOverTime:
      type: object
      required: [period, amount, count]
      properties:
        period:
          type: string
        amount:
          type: number
        count:
          type: integer

    ContractAnalytics:
      type: object
      required:
        - totalCount
        - totalAmount
        - withoutTenderCount
        - withoutTenderPct
        - withoutMepaCount
        - withoutMepaPct
        - topBeneficiaries
        - mostRecurrentBeneficiary
        - byProcedure
        - byAcquisitionTool
        - amountOverTime
      properties:
        totalCount:
          type: integer
        totalAmount:
          type: number
        withoutTenderCount:
          type: integer
        withoutTenderPct:
          type: number
        withoutMepaCount:
          type: integer
        withoutMepaPct:
          type: number
        topBeneficiaries:
          type: array
          items:
            $ref: "#/components/schemas/NameValue"
        mostRecurrentBeneficiary:
          oneOf:
            - $ref: "#/components/schemas/NameCount"
            - type: "null"
        byProcedure:
          type: array
          items:
            $ref: "#/components/schemas/NameCount"
        byAcquisitionTool:
          type: array
          items:
            $ref: "#/components/schemas/NameCount"
        amountOverTime:
          type: array
          items:
            $ref: "#/components/schemas/AmountOverTime"

    Act:
      type: object
      required:
        - id
        - title
        - type
        - number
        - summary
        - publishDate
        - endDate
      properties:
        id:
          type: integer
        title:
          type: string
        type:
          type: string
        number:
          type: string
        summary:
          type: string
        publishDate:
          type: string
        endDate:
          type: string
        themeId:
          type: ["integer", "null"]

    Publication:
      type: object
      required:
        - id
        - progressivo
