        name:
          type: string
        slug:
          type: string
        membershipRole:
          type: ["string", "null"]

    OfficialProfile:
      allOf:
        - $ref: "#/components/schemas/Official"
        - type: object
          required: [activities, remunerations, declarations, votes, organi]
          properties:
            activities:
              type: array
              items:
                $ref: "#/components/schemas/OfficialActivity"
            remunerations:
              type: array
              items:
                $ref: "#/components/schemas/OfficialRemuneration"
            declarations:
              type: array
              items:
                $ref: "#/components/schemas/OfficialDeclaration"
            votes:
              type: array
              items:
                $ref: "#/components/schemas/OfficialVote"
            organi:
              type: array
              items:
                $ref: "#/components/schemas/OfficialOrgano"

    DeliberaVoteEntry:
      type: object
      required: [officialId, name, slug, role, vote]
      properties:
        officialId:
          type: integer
        name:
          type: string
        slug:
          type: string
        role:
          type: string
        group:
          type: ["string", "null"]
        vote:
          type: string
          enum: [favorevole, contrario, astenuto, assente]

    DeliberaVotes:
      type: object
      required: [delibera, tally, votes]
      properties:
        delibera:
          $ref: "#/components/schemas/Publication"
        tally:
          type: object
          required: [favorevole, contrario, astenuto, assente]
          properties:
            favorevole:
              type: integer
            contrario:
              type: integer
            astenuto:
              type: integer
            assente:
              type: integer
        votes:
          type: array
          items:
            $ref: "#/components/schemas/DeliberaVoteEntry"

    OfficialInput:
      type: object
      required: [name, role]
      properties:
        name:
          type: string
          minLength: 1
        role:
          type: string
          minLength: 1
        roleTitle:
          type: string
        group:
          type: string
        status:
          type: string
        appointmentDate:
          type: string
        biography:
          type: string
        activities:
          type: array
          items:
            type: object
            required: [title]
            properties:
              title:
                type: string
                minLength: 1
              description:
                type: string
              date:
                type: string
        remunerations:
          type: array
          items:
            type: object
            required: [year, type]
            properties:
              year:
                type: integer
              amount:
                type: number
              type:
                type: string
                minLength: 1
              note:
                type: string
        declarations:
          type: array
          items:
            type: object
            required: [title]
            properties:
              title:
                type: string
                minLength: 1
              date:
                type: string
              content:
                type: string
              url:
                type: string
        votes:
          type: array
          items:
            type: object
            required: [publicationId, vote]
            properties:
              publicationId:
                type: integer
              vote:
                type: string
                enum: [favorevole, contrario, astenuto, assente]

    OversightOpinion:
      type: object
      required:
        - id
        - title
        - issuingBody
        - opinionType
        - subject
        - status
        - opinionDate
      properties:
        id:
          type: integer
        title:
          type: string
        issuingBody:
          type: string
          description: Organo emittente (es. Collegio dei Revisori, OIV, Corte dei Conti, ANAC)
        opinionType:
          type: string
          description: Tipologia di parere
        subject:
          type: string
          description: Oggetto / breve descrizione del parere
        outcome:
          type: ["string", "null"]
          description: Eventuale esito o sintesi breve
        status:
          type: string
          description: Stato di pubblicazione
        opinionDate:
          type: string

    OversightOpinionDocument:
      type: object
      required: [id, title, type, date]
      properties:
        id:
          type: integer
        title:
          type: string
        type:
          type: string
        url:
          type: ["string", "null"]
        date:
          type: string

    OversightOpinionDetail:
      allOf:
        - $ref: "#/components/schemas/OversightOpinion"
        - type: object
          required: [documents]
          properties:
            body:
              type: ["string", "null"]
              description: Testo o sintesi estesa del parere
            documents:
              type: array
              items:
                $ref: "#/components/schemas/OversightOpinionDocument"
