    PerformanceIndicator:
      type: object
      required:
        - id
        - slug
        - categoryId
        - title
        - description
        - unit
        - source
        - updateMode
        - polarity
        - position
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        slug:
          type: string
        categoryId:
          type: integer
        title:
          type: string
        description:
          type: string
        unit:
          type: string
        source:
          type: string
        sourceUrl:
          type: ["string", "null"]
        updateMode:
          type: string
          enum: [manual, automatic]
        polarity:
          type: string
          enum: [higher_better, lower_better, neutral]
        externalKey:
          type: ["string", "null"]
        position:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
        latestValue:
          description: >-
            Most recent value (value + period), included inline by the
            categories endpoint so the list can render without a per-indicator
            detail request. Null when the indicator has no values.
          oneOf:
            - $ref: "#/components/schemas/PerformanceLatestValue"
            - type: "null"
        previousValue:
          description: >-
            Second most recent value, included inline by the categories endpoint
            so the list can compute the trend. Null when fewer than two values.
          oneOf:
            - $ref: "#/components/schemas/PerformanceLatestValue"
            - type: "null"
        recentValues:
          type: array
          description: >-
            A short window of the most recent values (oldest to newest, up to the
            last 6 periods), included inline by the categories endpoint so the
            list can render a mini trend sparkline without a per-indicator detail
            request. Empty when the indicator has no values.
          items:
            $ref: "#/components/schemas/PerformanceLatestValue"

    PerformanceLatestValue:
      type: object
      description: Compact value of a single period (used for inline latest/previous).
      required: [value, period]
      properties:
