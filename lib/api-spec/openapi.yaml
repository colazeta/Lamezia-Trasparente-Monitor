      responses:
        "200":
          description: Feed status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedStatus"

  /admin/publications/briefs-status:
    get:
      operationId: getBriefsStatus
      tags: [publications]
      summary: >-
        Status of the "In breve" (AI summary) backfill: how many acts still lack
        a summary, how many already have one, and whether a batch is running.
        Editor only.
      security:
        - ingestToken: []
      responses:
        "200":
          description: Brief generation status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BriefBatchStatus"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/publications/generate-briefs:
    post:
      operationId: generateBriefs
      tags: [publications]
      summary: >-
        Start a background batch that generates the "In breve" (AI summary) for
        every act that has full text but no summary yet. Editor only. Returns
        immediately; progress is visible in the api-server logs.
      security:
        - ingestToken: []
      responses:
        "202":
          description: Batch started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BriefBatchResult"
        "200":
          description: Nothing to do (all summaries already present)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BriefBatchResult"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: A batch is already running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: AI generation not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/publications/{id}/regenerate-brief:
    post:
      operationId: regeneratePublicationBrief
      tags: [publications]
      summary: >-
        Regenerate the "In breve" (AI summary) for a single act on demand, force
        overwriting an existing non-manual summary. Editor only. Use when a
        generated summary is wrong or low quality.
      security:
        - ingestToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated act with the regenerated summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Publication"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: A generation for this act is already in flight
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: The AI service did not return a summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: AI generation not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

