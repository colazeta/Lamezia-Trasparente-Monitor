components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name.
        size:
          type: integer
          minimum: 1
          description: File size in bytes.
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file (e.g. `image/jpeg`).

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
          description: Presigned GCS URL for PUT upload.
        objectPath:
          type: string
          description: Normalized object path (e.g. `/objects/uploads/uuid`). Embed this in the post body.
        metadata:
          $ref: "#/components/schemas/UploadUrlRequest"

    Category:
      type: object
      required: [id, name, slug, description, themeCount]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        themeCount:
          type: integer

    Theme:
      type: object
      required:
        - id
        - title
        - slug
        - summary
        - categoryId
        - categoryName
        - status
        - relevanceCount
        - shareCount
        - followerCount
        - signalled
        - updatedAt
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        summary:
          type: string
        categoryId:
          type: integer
        categoryName:
          type: string
        status:
          type: string
          enum: [aperto, in_corso, monitoraggio, chiuso]
        relevanceCount:
          type: integer
        shareCount:
          type: integer
        followerCount:
          type: integer
        signalled:
          type: boolean
          description: Whether the requesting source has already signalled this theme as relevant
        updatedAt:
          type: string

    ThemeDetail:
      type: object
      required:
        - id
        - title
        - slug
        - summary
        - description
        - categoryId
        - categoryName
        - status
        - relevanceCount
        - shareCount
        - followerCount
        - signalled
        - updatedAt
        - documents
        - emails
        - metrics
        - contracts
        - acts
        - posts
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        summary:
          type: string
        description:
          type: string
        categoryId:
          type: integer
        categoryName:
          type: string
        status:
          type: string
          enum: [aperto, in_corso, monitoraggio, chiuso]
        relevanceCount:
          type: integer
        shareCount:
          type: integer
        followerCount:
          type: integer
        signalled:
          type: boolean
          description: Whether the requesting source has already signalled this theme as relevant
        updatedAt:
          type: string
        documents:
          type: array
          items:
            $ref: "#/components/schemas/ThemeDocument"
        emails:
          type: array
          items:
            $ref: "#/components/schemas/ThemeEmail"
        metrics:
          type: array
          items:
            $ref: "#/components/schemas/ThemeMetric"
        contracts:
          type: array
          items:
            $ref: "#/components/schemas/Contract"
        acts:
          type: array
          items:
            $ref: "#/components/schemas/Act"
        posts:
          type: array
          items:
            $ref: "#/components/schemas/ThemePost"

    ThemePost:
      type: object
      required: [id, themeId, body, eventDate, createdAt, updatedAt]
      properties:
        id:
          type: integer
        themeId:
          type: integer
        title:
          type: ["string", "null"]
        body:
          type: string
        eventDate:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string

    ThemePostInput:
      type: object
      required: [body]
      properties:
        title:
          type: string
        body:
          type: string
          minLength: 1
        eventDate:
          type: string

    ThemePostUpdateInput:
      type: object
      properties:
        title:
          type: ["string", "null"]
        body:
          type: string
          minLength: 1
        eventDate:
          type: string

    Question:
      type: object
      required:
        - id
        - text
        - destinationPath
        - ctaLabel
        - topic
        - featured
        - sortOrder
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        text:
          type: string
        teaser:
          type: ["string", "null"]
        destinationPath:
          type: string
        ctaLabel:
          type: string
        topic:
          type: string
        featured:
          type: boolean
        sortOrder:
          type: integer
        status:
          type: string
          enum: [draft, published]
        createdAt:
          type: string
        updatedAt:
          type: string

    QuestionInput:
      type: object
      required: [text, destinationPath, ctaLabel, topic]
      properties:
        text:
          type: string
          minLength: 1
        teaser:
          type: string
        destinationPath:
          type: string
          minLength: 1
        ctaLabel:
          type: string
          minLength: 1
        topic:
          type: string
          minLength: 1
        featured:
          type: boolean
        sortOrder:
          type: integer
        status:
          type: string
          enum: [draft, published]

    QuestionUpdateInput:
      type: object
      properties:
        text:
          type: string
          minLength: 1
        teaser:
          type: ["string", "null"]
        destinationPath:
          type: string
          minLength: 1
        ctaLabel:
          type: string
          minLength: 1
        topic:
          type: string
          minLength: 1
        featured:
          type: boolean
        sortOrder:
          type: integer
        status:
          type: string
          enum: [draft, published]

    ThemeDocument:
      type: object
      required: [id, title, type, date]
      properties:
        id:
          type: integer
        title:
          type: string
        type:
          type: string
        url:
          type: ["string", "null"]
        date:
          type: string

    ThemeEmail:
      type: object
      required: [id, subject, sender, recipient, direction, date, body]
      properties:
        id:
          type: integer
        subject:
          type: string
        sender:
          type: string
        recipient:
          type: string
        direction:
          type: string
          enum: [inviata, ricevuta]
        date:
          type: string
        body:
          type: string

    ThemeMetric:
      type: object
      required: [id, label, value, unit]
      properties:
        id:
          type: integer
        label:
          type: string
        value:
          type: string
        unit:
          type: string

    Contract:
      type: object
      required:
        - id
        - title
        - description
        - supplier
        - amount
        - procedureType
        - status
        - awardDate
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        supplier:
          type: string
        amount:
          type: number
        procedureType:
          type: string
        status:
          type: string
        awardDate:
          type: string
        cig:
          type: ["string", "null"]
        cup:
          type: ["string", "null"]
        stazioneAppaltante:
          type: ["string", "null"]
        acquisitionTool:
          type: ["string", "null"]
        withoutTender:
          type: boolean
        withoutMepa:
          type: boolean
        anacUrl:
          type: ["string", "null"]
        themeId:
          type: ["integer", "null"]
        macrotema:
          description: Spending-area key (ambiente, scuole, strade, …) or null
          oneOf:
            - $ref: "#/components/schemas/MacrotemaKey"
            - type: "null"
        macrotemaManual:
          type: boolean
          description: True when an editor manually corrected the spending area
        latitude:
          type: ["number", "null"]
          description: WGS84 latitude of the intervention, or null if not located
        longitude:
          type: ["number", "null"]
          description: WGS84 longitude of the intervention, or null if not located
        geoAddress:
          type: ["string", "null"]
          description: Resolved location label (e.g. street name)
        geoQuartiere:
          type: ["string", "null"]
          description: Neighborhood key (nicastro / sambiase / santeufemia)
        geoSource:
          type: ["string", "null"]
          description: Origin of the location (auto = geocoding, manual = editor)
        geoManual:
          type: boolean
          description: True when an editor manually set/corrected the location
        geoVerify:
          type: boolean
          description: True when the location is uncertain and needs review

    MacrotemaKey:
      type: string
      description: Ambito di spesa (macrotema) di un contratto
      enum:
        - ambiente
        - scuole
        - strade
        - sociale
        - cultura
        - mobilita
        - altro

    UpdateContract:
      type: object
      required: [macrotema]
      properties:
        macrotema:
          $ref: "#/components/schemas/MacrotemaKey"

    UpdateContractLocation:
      type: object
      description: >-
