name: Albo Pretorio ingestion

on:
  workflow_dispatch:
  schedule:
    # GitHub cron is UTC. This hourly window covers both CET and CEST cases;
    # the first step checks TZ=Europe/Rome and skips scheduled runs outside
    # the civic monitoring window 08:00-20:00 Europe/Rome.
    - cron: "10 6-19 * * *"

permissions:
  contents: write

concurrency:
  group: albo-pretorio-ingestion
  cancel-in-progress: false

jobs:
  ingest-albo:
    name: Fetch and publish Albo public outputs
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check Rome monitoring window
        id: rome_window
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch: running outside the scheduled-window guard."
            exit 0
          fi

          rome_hour="$(TZ=Europe/Rome date +%H)"
          if [ "$rome_hour" -ge 8 ] && [ "$rome_hour" -le 20 ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Scheduled run accepted for Europe/Rome hour $rome_hour."
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Scheduled run skipped for Europe/Rome hour $rome_hour."
          fi

      - name: Checkout
        if: steps.rome_window.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: steps.rome_window.outputs.should_run == 'true'
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        if: steps.rome_window.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        if: steps.rome_window.outputs.should_run == 'true'
        run: pnpm install --frozen-lockfile

      - name: Fetch Albo Pretorio
        if: steps.rome_window.outputs.should_run == 'true'
        run: pnpm albo:fetch

      - name: Commit generated Albo outputs
        if: steps.rome_window.outputs.should_run == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/public/albo

          if git diff --cached --quiet; then
            echo "No Albo output changes to commit."
            exit 0
          fi

          git commit -m "Update Albo Pretorio public outputs"
          git push
