name: deploy smoke

on:
  workflow_dispatch:
    inputs:
      public_url:
        description: "Optional public site URL to smoke-check after the local build"
        required: false
        default: "https://lamezia-trasparente.pages.dev"
        type: string
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-smoke.yml'
      - '.github/workflows/cloudflare-pages-deploy.yml'
      - 'artifacts/api-server/src/routes/organi.ts'
      - 'artifacts/api-server/src/routes/organi.test.ts'
      - 'artifacts/lamezia-trasparente/**'
      - 'data/public/albo/**'
      - 'data/processed/territorio/**'
      - 'data/sources/organi-istituzionali-*.json'
      - 'lib/db/src/institutional-officials*.ts'
      - 'lib/db/src/organi-sync.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'scripts/check-institutional-*.ts'
      - 'scripts/check-public-contracts-page.mjs'
      - 'scripts/check-v0-static-fallback.mjs'
      - 'wrangler.toml'

permissions:
  contents: read

jobs:
  static-fallback-smoke:
    name: Build and smoke v0 static fallback
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static fallback
        run: pnpm --filter @workspace/lamezia-trasparente run build

      - name: Smoke static fallback
        run: pnpm run smoke:v0-static-fallback

      - name: Optional production URL smoke
        env:
          PUBLIC_SITE_URL: ${{ inputs.public_url || vars.PUBLIC_SITE_URL || 'https://lamezia-trasparente.pages.dev' }}
        run: node scripts/check-public-contracts-page.mjs --url "$PUBLIC_SITE_URL" --attempts 12 --delay-ms 10000
