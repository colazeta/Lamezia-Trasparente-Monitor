name: deploy smoke

on:
  workflow_dispatch:
    inputs:
      public_url:
        description: "Optional public site URL to smoke-check after the local build"
        required: false
        default: "https://lamezia-trasparente.pages.dev"
        type: string
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-smoke.yml'
      - 'artifacts/lamezia-trasparente/**'
      - 'data/public/albo/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'scripts/check-v0-static-fallback.mjs'

permissions:
  contents: read

jobs:
  static-fallback-smoke:
    name: Build and smoke v0 static fallback
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static fallback
        run: pnpm --filter @workspace/lamezia-trasparente run build

      - name: Smoke static fallback
        run: pnpm run smoke:v0-static-fallback

      - name: Optional production URL smoke
        env:
          PUBLIC_SITE_URL: ${{ inputs.public_url || vars.PUBLIC_SITE_URL }}
        run: |
          if [ -z "$(printf '%s' "$PUBLIC_SITE_URL" | tr -d '[:space:]')" ]; then
            echo "No PUBLIC_SITE_URL variable or workflow_dispatch public_url input configured; skipping live URL smoke."
            exit 0
          fi

          echo "Checking $PUBLIC_SITE_URL"
          for attempt in 1 2 3 4 5 6; do
            failed=0
            for path in "/" "/contratti"; do
              target="${PUBLIC_SITE_URL%/}${path}"
              if ! curl -fsSL --max-time 20 "$target" >/tmp/ltm-public.html; then
                echo "URL smoke attempt $attempt failed for $target."
                failed=1
                continue
              fi
              if ! grep -Eiq "rendiamoLameziaTrasparente|Osservatorio Civico Indipendente|Lamezia" /tmp/ltm-public.html; then
                echo "URL reachable but expected public marker not found for $target."
                failed=1
              fi
            done

            root_target="${PUBLIC_SITE_URL%/}/"
            if curl -fsSL --max-time 20 "$root_target" >/tmp/ltm-public-root.html; then
              grep -oE 'src="[^"]+\.js[^""]*"' /tmp/ltm-public-root.html \
                | sed -E 's/^src="//; s/"$//' \
                | sort -u >/tmp/ltm-public-scripts.txt || true
            else
              : >/tmp/ltm-public-scripts.txt
            fi

            if [ ! -s /tmp/ltm-public-scripts.txt ]; then
              echo "No generated JavaScript assets found on public URL."
              failed=1
            else
              : >/tmp/ltm-public-bundle.txt
              while IFS= read -r script_path; do
                case "$script_path" in
                  http://*|https://*) script_url="$script_path" ;;
                  /*) script_url="${PUBLIC_SITE_URL%/}${script_path}" ;;
                  *) script_url="${PUBLIC_SITE_URL%/}/${script_path}" ;;
                esac
                if ! curl -fsSL --max-time 20 "$script_url" >>/tmp/ltm-public-bundle.txt; then
                  echo "Could not fetch public JavaScript asset: $script_url"
                  failed=1
                fi
                printf '\n' >>/tmp/ltm-public-bundle.txt
              done </tmp/ltm-public-scripts.txt

              for marker in "Contratti protagonisti" "Stato dei fascicoli contrattuali" "Copertura fasi"; do
                if ! grep -Fq "$marker" /tmp/ltm-public-bundle.txt; then
                  echo "Public JavaScript bundle is missing contract state marker: $marker"
                  failed=1
                fi
              done
            fi

            if [ "$failed" -eq 0 ]; then
              echo "Production URL smoke passed."
              exit 0
            else
              echo "URL smoke attempt $attempt failed."
            fi
            sleep 10
          done

          echo "Production URL smoke failed after retries."
          exit 1
