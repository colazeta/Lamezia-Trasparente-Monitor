name: GitHub Pages static fallback

on:
  workflow_dispatch:
    inputs:
      deploy_to_pages:
        description: "Deploy to GitHub Pages. Requires Pages to be enabled for this repository."
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - ".github/workflows/pages-static-fallback.yml"
      - "artifacts/lamezia-trasparente/**"
      - "data/processed/territorio/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-static-fallback
  cancel-in-progress: true

jobs:
  build:
    name: Build static fallback
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend for GitHub Pages
        env:
          BASE_PATH: /Lamezia-Trasparente-Monitor/
          CI: "true"
        run: pnpm --filter @workspace/lamezia-trasparente run build

      - name: Add SPA fallback
        shell: bash
        run: cp artifacts/lamezia-trasparente/dist/public/index.html artifacts/lamezia-trasparente/dist/public/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/lamezia-trasparente/dist/public

  deploy:
    name: Deploy static fallback
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_to_pages }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
