name: v0 static fallback smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-static-fallback:
    name: Build and smoke static fallback
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build static fallback
        run: pnpm --filter @workspace/lamezia-trasparente run build

      - name: Smoke static fallback
        run: pnpm run smoke:v0-static-fallback

      - name: Upload static fallback artifact
        uses: actions/upload-artifact@v4
        with:
          name: v0-static-fallback-public
          path: artifacts/lamezia-trasparente/dist/public
          if-no-files-found: error
          retention-days: 7
