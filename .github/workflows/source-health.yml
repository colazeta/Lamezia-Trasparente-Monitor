name: Source health monitor

on:
  workflow_dispatch:
    inputs:
      source_health_url:
        description: "Optional GET /healthz/sources URL override"
        required: false
        type: string
  schedule:
    # Every 3 hours, offset from hour-based ingestion cycles.
    - cron: "20 */3 * * *"

permissions:
  contents: read
  issues: write

jobs:
  check-source-health:
    name: Check monitored source health
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check source health and sync issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SOURCE_HEALTH_URL: ${{ secrets.SOURCE_HEALTH_URL }}
          SOURCE_HEALTH_MANUAL_URL: ${{ inputs.source_health_url }}
          SOURCE_HEALTH_AUDIT_PATH: ${{ vars.SOURCE_HEALTH_AUDIT_PATH }}
          SOURCE_HEALTH_WARNING_RUNS: ${{ vars.SOURCE_HEALTH_WARNING_RUNS || '2' }}
        run: |
          args=()
          if [ -n "$(printf '%s' "$SOURCE_HEALTH_MANUAL_URL" | tr -d '[:space:]')" ]; then
            args+=(--url "$SOURCE_HEALTH_MANUAL_URL")
          fi

          if [ ${#args[@]} -gt 0 ]; then
            pnpm --dir scripts run check-source-health -- "${args[@]}"
          else
            pnpm --dir scripts run check-source-health
          fi
